<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — WorkSphere</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Inter', sans-serif;
}

body{
    height:100vh;
    background: radial-gradient(circle at 20% 20%, #0f1c3d, #020617 70%);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.container{
    width:380px;
    padding:40px 35px;
    border-radius:18px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.logo{
    text-align:center;
    font-size:26px;
    font-weight:600;
    margin-bottom:25px;
}

.logo span{
    color:#5da9ff;
}

h2{
    text-align:center;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#9ca3af;
    margin-bottom:25px;
    font-size:14px;
}

label{
    font-size:13px;
    color:#9ca3af;
}

input{
    width:100%;
    padding:14px;
    margin:8px 0 18px 0;
    border-radius:10px;
    border:none;
    outline:none;
    background:#0b1225;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background: linear-gradient(to right,#4f8cff,#6ea8ff);
    color:white;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

.bottom{
    text-align:center;
    margin-top:20px;
    font-size:14px;
    color:#9ca3af;
}

.bottom a{
    color:#6ea8ff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo"><span>•</span> WorkSphere</div>

    <h2>Create your account</h2>
    <div class="subtitle">Start your workspace journey</div>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="John Doe" required>

        <label>Work Email</label>
        <input type="email" placeholder="name@company.com" required>

        <label>Password</label>
        <input type="password" placeholder="Create password" required>

        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password" required>

        <button type="submit">Create account →</button>
    </form>

    <div class="bottom">
        Already have an account?
        <a href="login.html">Sign in</a>
    </div>

</div>

</body>
</html>
